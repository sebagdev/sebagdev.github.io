# Site settings
title: "Life, coding 'n' everything"
name: "Sebastian Gabor"
description: "Blog o programowaniu, chmurze i technologii — Java, Azure, Terraform, architektura mikroserwisów i nie tylko."
url: "https://sebastiangabor.pl"
baseurl: ""
lang: pl
repository: "sebagdev/sebagdev.github.io"

# Theme
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"

# Author
author:
  name: "Sebastian Gabor"
  bio: "Programista-pasjonat. Java, Spring Boot, cloud (Azure, Heroku), Terraform. Python hobbystycznie. Fan mikroserwisów i dobrych praktyk DevOps."
  location: "Polska"
  avatar: "/assets/images/avatar.svg"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sebagdev"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/sebagabor"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:sebastian.gabor@protonmail.com"

# Social links (for SEO)
twitter:
  username: "sebagabor"
github:
  username: "sebagdev"
social:
  name: "Sebastian Gabor"
  links:
    - "https://twitter.com/sebagabor"
    - "https://github.com/sebagdev"

# Build settings
permalink: /:year/:month/:day/:title/
paginate: 10
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-paginate

# Feed
feed:
  path: atom.xml

# Reading time
words_per_minute: 200

# Comments (giscus — fill in repo_id and category_id after setting up GitHub Discussions)
comments:
  provider: false

# Search
search: true
search_full_content: true


# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      share: true
      related: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Include _pages in build
include:
  - _pages

# Sass
sass:
  style: compressed

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - "*.sh"
